name: c3standards-upgrader
run-name: c3standards Upgrader

on:
  workflow_dispatch:
#   # [Configuration] Uncomment and set the cron schedule to auto-update the c3standards.
#   #                 By default, the auto-update is performed at midnight every Sunday.
#   schedule:
#     # The cron expression is in UTC. 7:00 UTC corresponds to midnight PDT.
#     - cron: '0 7 * * SUN'

permissions: write-all

env:
  # The source branch from the c3standards repository to merge from.
  source_branch: 'support/v8.7'

  # The target branch to merge the c3standards repository into.
  target_branch: 'develop'

  # Boolean to indicate whether the c3standards upgrader should always create a PR.
  # By default, if there are patch conflicts, the patched changes are merged automatically into
  # the `target_branch` configured above.
  always_create_pr: false

jobs:
  c3standards-upgrader:
    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Validate GitHub Token Access
        run: |
          echo "Validating access to repositories and permissions..."

          # Check access to current repository and validate push permissions
          REPO_PERMS=$(curl -H "Authorization: token ${{ secrets.AUTOMATION_GITHUB_TOKEN }}" \
            -s https://api.github.com/repos/${{ github.repository }})

          # Check if we got a valid JSON response with permissions
          if ! echo "$REPO_PERMS" | jq -e '.permissions' > /dev/null; then
            echo "Error: Cannot access the current repository with the provided token."
            exit 1
          fi

          # Check for push permission
          if ! echo "$REPO_PERMS" | jq -e '.permissions.push == true' > /dev/null; then
            echo "Error: Token does not have push permissions to the current repository."
            exit 1
          fi

          # Check access to c3standards repository
          C3_PERMS=$(curl -H "Authorization: token ${{ secrets.AUTOMATION_GITHUB_TOKEN }}" \
            -s https://api.github.com/repos/c3-e/c3standards)

          if ! echo "$C3_PERMS" | jq -e '.permissions' > /dev/null; then
            echo "Error: Cannot access the c3standards repository with the provided token."
            exit 1
          fi

          echo "Token validation successful."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: c3-e/c3standards
          path: c3standards
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
          ref: ${{ env.source_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Run the c3standards-upgrader script
        run: |
          tree c3standards
          echo ${{ github.workspace }}
          ls
          cd ${{ github.workspace }}/c3standards
          git config --global user.email "engx@c3.ai"
          git config --global user.name "ENG-X Automation"
          cd ${{ github.workspace }}/main
          git config --global user.email "engx@c3.ai"
          git config --global user.name "ENG-X Automation"
          pip install requests
          python scripts/c3standards-upgrader/c3standards-upgrader.py ${{ env.source_branch }} ${{ env.target_branch }} ${{ env.always_create_pr }} ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
